[workspace]
name = "eval-hive"
channels = ["conda-forge"]
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<3.14"
duckdb-cli = ">=1.4.4,<2"
jq = ">=1.7,<2"

[tasks]
eval-hive = "python -m eval_hive"
auto-eval = { cmd = "python scripts/run_eval.py", description = "Run eval loop: pixi run auto-eval <run_dir> <config> [--interval N]" }

[pypi-dependencies]
pydantic = ">=2.12.5, <3"
pyyaml = ">=6.0, <7"
loguru = ">=0.7, <1"
tabulate = ">=0.9, <1"
tqdm = ">=4.60, <5"
aiohttp = ">=3.9, <4"
transformers = ">=5.0.0, <6"
hf-transfer = ">=0.1, <1"
polars = ">=1.0, <2"
huggingface-hub = ">=1.3, <2"
sentencepiece = ">=0.2, <1"
lm-eval = {git = "https://github.com/EleutherAI/lm-evaluation-harness", branch = "main", extras = ["api", "math", "multilingual", "sentencepiece", "ruler"]}
duckdb = ">=1.4.4, <2"
protobuf = ">=7.34.1, <8"
# filelock >=3.16 adds an at-fork audit that raises "os.fork is unsafe while
# filelock is changing descriptor ownership" when evaluate's code_eval forks to
# sandbox generated code (HumanEval/MBPP/LBPP). Pin below it so code tasks work.
filelock = "<3.16"
