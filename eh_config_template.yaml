# === Placeholder variables ===
# substituted at runtime:
#   ${EH_PORT}        — dynamically assigned port (random 30000-59999)
#   ${EH_MODEL_PATH}  — resolved model path (local path or HF cache path)

# === SLURM Configuration ===
# Consult your cluster's documentation if you are unsure about the values below.
job_name: ""
partition: ""
account: ""
# qos: "normal"
qos: ""
cpus_per_node: 32 
gres_per_node: "gpu:4"
time_limit: "23:58:00"

# Additional SBATCH arguments (optional)
additional_sbatch_args:
# exclude: "node[001-010]"  # Exclude specific nodes

# === Scaling Configuration ===
# The total number of nodes will be num_inference_servers * num_nodes_per_inference_server.
num_inference_servers: 1
num_nodes_per_inference_server: 1 # Increase this only if your model requires more than 1 node per inference server.
parallel_tasks: 8  # Max concurrent lm-eval processes per job (one per task). Requires 'prepare' to be run first. 1 = sequential.
task_batch_size: 8  # Tasks per lm-eval invocation (parallel mode). Larger = less filesystem I/O, but more progress lost on failure.

# === Environment Configuration ===
# Option 1: Use pixi (set pixi_manifest and pixi_env)
pixi_manifest: "pixi.toml"  # Path to the pixi manifest file. Edit only if you want to use one of the pre-installed environments (see README.md).
pixi_env: "default"  # Name of the pixi environment to use (see README.md).
# Option 2: Use a custom activation command (clear pixi_manifest and pixi_env above, set env_activation_command)
env_activation_command:  # Custom command to activate the environment, e.g. "source ./activate.sh"
env_vars:
  HF_HUB_OFFLINE: "1" # you should download data and model beforehand
  TORCHINDUCTOR_CACHE_DIR: "${SCRATCH}/tmp_home/torchinductor_${SLURM_JOB_ID}"
  VLLM_CACHE_ROOT: "${SCRATCH}/tmp_home/vllm_cache_${SLURM_JOB_ID}"

# === Inference Server Configuration ===
# Port is dynamically set by inference-hive using $EH_PORT (random port 30000-59999)
# This avoids port collisions when multiple shards run on the same node.
# 
# Model path is dynamically set by inference-hive using $EH_MODEL_PATH (local path or HF cache path)
inference_server_command: >-
  singularity exec --nv
  --env HF_HUB_OFFLINE=1
  --home $SCRATCH/tmp_home
  --bind $SCRATCH/tmp_home/container_tmp:/tmp
  --bind ${EH_MODEL_PATH}:${EH_MODEL_PATH}
  /leonardo_work/AIFAC_L01_028/midahl00/base-eval-suite/containers/vllm/vllm-openai_v0.14.1.sif
  vllm serve ${EH_MODEL_PATH}
      --host 0.0.0.0
      --port ${EH_PORT}
      --data-parallel-size 4
      --max-num-seqs 512
      --max-model-len 4096
      --enable-chunked-prefill
      --enable-prefix-caching
      --gpu-memory-utilization 0.6

# === Health Check Configuration ===
# max_wait_minutes is the maximum time to wait for the API server to become healthy.
# make sure it is reasonable for loading the model. larger models will take longer.
health_check_max_wait_minutes: 10  # Maximum time to wait for API server to become healthy.
health_check_interval_seconds: 20  # Interval between health check attempts
# Relaunch the inference server after transient startup failures before failing the job.
server_start_max_attempts: 3

# === Eval Configuration ===
eval:
  eval_suite_path: "/leonardo_work/AIFAC_L01_028/midahl00/base-eval-suite" # path to the eval suite directory
  suites_and_tasks:
    - eng_base_easy
    - deu_base_easy
  # --model_args: joined as key=value,key=value
  model_args:
    model: ${EH_MODEL_PATH}
    tokenizer: ${EH_MODEL_PATH}
    base_url: http://localhost:${EH_PORT}/v1/completions
    num_concurrent: 4
    max_length: 4096
  # HTTP timeout and retries for lm-eval API requests.
  # Injected into model_args unless already set there.
  timeout: 600        # seconds (default: 600)
  max_retries: 5      # attempts (default: 5)
  # All other lm_eval CLI flags, passed through as --key value
  lm_eval_args:
    model: local-completions
    batch_size: 16
    log_samples: true

# === Output Configuration ===
output_path: ""
request_cache_dir: "lm_eval_requests_cache"  # optional: shared request cache for lm-eval (LM_HARNESS_CACHE_PATH)
# Optional tokenizer used while preparing synthetic datasets such as RULER.
# Defaults to eval.model_args.tokenizer/pretrained or the first resolved model path.
# prepare_tokenizer: "/path/to/tokenizer"

# === HuggingFace Results ===
# Optional: HF dataset repo for result storage (e.g. 'org/eval-scores').
# When set, model-task-combinations already covered in the repo are skipped,
# and 'collect --upload' pushes results to it.
# hf_result_repo: "org/eval-scores"

models:
  qwen3_4b:
    model_key: qwen3_4b
    path: "/leonardo_work/AIFAC_L01_028/models/Qwen/Qwen3-4B-Base/main"
    display_name: "Qwen3 4B"
    tokens_trained: 36T

  smollm3_3b_stage1:
    model_key: smollm3_3b
    path: "/leonardo_work/AIFAC_L01_028/models/HuggingFaceTB/SmolLM3-3B-checkpoints"
    checkpoint_pattern: "stage1-step-{step}"
    display_name: "SmolLM3 3B"
    train_batch_size: 2_359_296
    steps: [
      40000, 80000, 120000, 160000, 200000,
      280000, 360000, 480000, 640000, 800000,
      1000000, 1200000, 1400000, 1600000, 2000000,
      2400000, 2800000, 3200000, 3440000
    ]